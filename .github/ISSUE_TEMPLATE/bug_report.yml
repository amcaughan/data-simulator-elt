name: Bug report
description: Report a defect or regression in the ELT platform or sample workflows.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What workflow, stack, or behavior is affected?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include commands, stack names, time windows, or logs if helpful.
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything else worth knowing.
